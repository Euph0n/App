<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>TaskFlow Gratuit</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <main class="app">
      <section class="task-workspace">
        <div class="section-head">
          <h2>Gestionnaire de taches</h2>
          <div class="section-actions">
            <button id="addTaskBtn" type="button" class="secondary settings-trigger icon-btn" aria-label="Ajouter une tache">
              <svg
                class="action-icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="18"
                height="18"
                aria-hidden="true"
              >
                <path fill="currentColor" d="M11 5a1 1 0 1 1 2 0v6h6a1 1 0 1 1 0 2h-6v6a1 1 0 1 1-2 0v-6H5a1 1 0 1 1 0-2h6z" />
              </svg>
            </button>
            <button
              id="togglePendingBtn"
              type="button"
              class="secondary settings-trigger icon-btn"
              aria-controls="tasksSection"
              aria-pressed="true"
              aria-label="Filtrer taches en cours"
              title="Filtrer taches en cours"
            >
              <svg
                class="action-icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="18"
                height="18"
                aria-hidden="true"
              >
                <path
                  fill="currentColor"
                  d="M7 2h10a1 1 0 0 1 .8 1.6L14.25 8A2 2 0 0 0 14 9.2V10a2 2 0 0 0 .25 1L17.8 16.4A1 1 0 0 1 17 18H7a1 1 0 0 1-.8-1.6L9.75 11A2 2 0 0 0 10 10V9.2a2 2 0 0 0-.25-1L6.2 3.6A1 1 0 0 1 7 2zm2.04 2 2.24 2.8c.45.57.72 1.29.72 2.02V10c0 .74-.27 1.45-.72 2.02L9.04 14h5.92l-2.24-1.98A3.24 3.24 0 0 1 12 10V8.82c0-.73.27-1.45.72-2.02L14.96 4H9.04z"
                />
              </svg>
            </button>
            <button
              id="toggleHistoryBtn"
              type="button"
              class="secondary settings-trigger icon-btn"
              aria-controls="tasksSection"
              aria-pressed="true"
              aria-label="Filtrer historique"
              title="Filtrer historique"
            >
              <svg
                class="action-icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="18"
                height="18"
                aria-hidden="true"
              >
                <path
                  fill="currentColor"
                  d="M13 3a9 9 0 1 1-6.36 2.64L5.41 7.87A1 1 0 0 1 4 6.46l3.07-3.07A1 1 0 0 1 8.5 4.8L8.05 5.25A7 7 0 1 0 13 5a1 1 0 1 1 0-2zm-1 4a1 1 0 0 1 1 1v3.59l2.7 2.7a1 1 0 1 1-1.4 1.42l-3-3A1 1 0 0 1 11 12V8a1 1 0 0 1 1-1z"
                />
              </svg>
            </button>
            <details id="settingsMenu" class="settings-menu" hidden>
              <summary class="secondary settings-trigger" aria-label="Parametres">
                <svg
                  class="settings-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  width="18"
                  height="18"
                  aria-hidden="true"
                >
                  <path
                    fill="currentColor"
                    d="M19.14 12.94a7.43 7.43 0 0 0 .05-.94a7.43 7.43 0 0 0-.05-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.39 7.39 0 0 0-1.62-.94l-.36-2.54A.5.5 0 0 0 13.9 2h-3.8a.5.5 0 0 0-.5.42l-.36 2.54c-.57.23-1.11.54-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.48a.5.5 0 0 0 .12.64l2.03 1.58a7.43 7.43 0 0 0-.05.94c0 .32.02.63.05.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.4 1.05.72 1.62.94l.36 2.54a.5.5 0 0 0 .5.42h3.8a.5.5 0 0 0 .5-.42l.36-2.54c.57-.23 1.11-.54 1.62-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"
                  />
                </svg>
              </summary>
              <div class="settings-panel">
                <p id="accountInfo" class="settings-account"></p>
                <button id="logoutBtn" type="button" class="secondary">Deconnexion</button>
                <button id="installBtn" type="button" class="secondary" hidden>Installer</button>
              </div>
            </details>
          </div>
        </div>
        <div id="tasksSection">
          <ul id="taskList" class="task-list"></ul>
        </div>
      </section>

      <p id="status" aria-live="polite"></p>
    </main>

    <div id="authOverlay" class="auth-overlay" hidden>
      <div class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <h2 id="authTitle">Connexion requise</h2>
        <p>Connectez-vous avec Google pour utiliser l'application.</p>
        <button id="loginBtn" type="button">Se connecter avec Google</button>
      </div>
    </div>

    <div id="taskFormOverlay" class="auth-overlay" hidden>
      <div class="auth-modal task-form-modal" role="dialog" aria-modal="true" aria-labelledby="taskFormTitle">
        <h2 id="taskFormTitle">Nouvelle tache</h2>
        <form id="taskForm" class="task-form">
          <div class="task-form-main">
            <label for="taskTitleInput">Titre</label>
            <input id="taskTitleInput" name="title" type="text" autocomplete="off" required />
          </div>

          <div class="task-form-panels">
            <div class="task-panel-block">
              <div id="taskDueFields" class="task-due-fields-inline">
                <div id="taskDateCard" class="task-due-field" role="button" tabindex="0" aria-label="Choisir une date">
                  <label>Date</label>
                  <button
                    id="taskDueDateBtn"
                    type="button"
                    class="secondary icon-btn task-due-date-btn"
                    aria-label="Choisir une date"
                    title="Choisir une date"
                  >
                    <i class="bi bi-calendar3" aria-hidden="true"></i>
                  </button>
                </div>

                <div id="taskTimeCard" class="task-due-field" role="button" tabindex="0" aria-label="Choisir l'heure">
                  <label>Heure</label>
                  <button
                    id="taskDueTimeWheelBtn"
                    type="button"
                    class="secondary task-due-time-btn"
                    aria-label="Choisir l'heure"
                  >
                    09:00
                  </button>
                </div>

                <input id="taskDueInput" class="task-due-native-input" name="due_date" type="date" aria-hidden="true" tabindex="-1" />
                <input id="taskDueTimeInput" name="due_time" type="hidden" value="09:00" />
              </div>
            </div>

            <div class="task-panel-block">
              <p class="task-panel-label">Recurrence</p>
              <div class="task-recurrence-group">
                <select id="taskRecurrenceInput" name="recurrence">
                  <option value="">Aucune</option>
                  <option value="daily">Quotidienne</option>
                  <option value="weekly">Hebdo</option>
                  <option value="monthly">Mensuelle</option>
                  <option value="weekly_days">Choisir les jours de la semaine</option>
                  <option value="custom">Personnalisee</option>
                </select>
                <div id="recurrenceCustom" class="recurrence-custom" hidden>
                  <span class="recurrence-custom-prefix">Tous les</span>
                  <input id="customCountInput" class="recurrence-custom-count" type="number" min="1" max="30" step="1" value="1" aria-label="Nombre" />
                  <select id="customUnitSelect" class="recurrence-custom-unit" aria-label="Temporalite">
                    <option value="day">jours</option>
                    <option value="week">semaines</option>
                    <option value="month">mois</option>
                  </select>
                </div>
                <div id="recurrenceDays" class="recurrence-days" hidden>
                  <button type="button" class="secondary recurrence-day-btn" data-day="1" aria-pressed="false">L</button>
                  <button type="button" class="secondary recurrence-day-btn" data-day="2" aria-pressed="false">M</button>
                  <button type="button" class="secondary recurrence-day-btn" data-day="3" aria-pressed="false">M</button>
                  <button type="button" class="secondary recurrence-day-btn" data-day="4" aria-pressed="false">J</button>
                  <button type="button" class="secondary recurrence-day-btn" data-day="5" aria-pressed="false">V</button>
                  <button type="button" class="secondary recurrence-day-btn" data-day="6" aria-pressed="false">S</button>
                  <button type="button" class="secondary recurrence-day-btn" data-day="0" aria-pressed="false">D</button>
                </div>
              </div>
            </div>
          </div>

          <div class="task-form-actions">
            <button id="cancelTaskFormBtn" type="button" class="secondary">Annuler</button>
            <button id="submitTaskFormBtn" type="submit">Ajouter</button>
          </div>
        </form>
      </div>
    </div>

    <div id="dueTimeOverlay" class="auth-overlay" hidden>
      <div class="auth-modal due-time-modal" role="dialog" aria-modal="true" aria-labelledby="dueTimeTitle">
        <h2 id="dueTimeTitle">Heure</h2>
        <div class="time-input-wrap" aria-label="Selecteur d'heure">
          <input
            id="dueTimeTextInput"
            class="time-single-input"
            type="text"
            inputmode="numeric"
            autocomplete="off"
            placeholder="09:00"
            value="09:00"
            aria-label="Heure (HH:MM)"
          />
        </div>
        <p id="dueTimeError" class="time-input-error" aria-live="polite"></p>
        <div class="task-form-actions">
          <button id="cancelDueTimeBtn" type="button" class="secondary">Annuler</button>
          <button id="confirmDueTimeBtn" type="button">Valider</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
