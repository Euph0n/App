<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>TaskFlow Gratuit</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <main class="app">
      <header>
        <h1>TaskFlow Gratuit</h1>
        <p>
          Gerez vos taches et leur historique depuis n'importe quel ordinateur grace
          a une base cloud gratuite (Supabase).
        </p>
      </header>

      <section class="card">
        <h2>Connexion</h2>
        <p id="authState">Session en cours de verification...</p>
        <div class="auth-row">
          <button id="loginBtn" type="button">Se connecter avec Google</button>
          <button id="logoutBtn" type="button" class="secondary" hidden>Se deconnecter</button>
          <button id="installBtn" type="button" class="secondary" hidden>Installer l'app</button>
        </div>
      </section>

      <section class="card">
        <h2>Nouvelle tache</h2>
        <form id="taskForm">
          <input
            id="taskInput"
            type="text"
            placeholder="Ex: Verifier les sauvegardes"
            maxlength="120"
            required
          />
          <button type="submit">Ajouter</button>
        </form>
      </section>

      <section class="card">
        <h2>Taches en cours</h2>
        <ul id="pendingTasks" class="task-list"></ul>
      </section>

      <section class="card">
        <h2>Historique des taches acquittees</h2>
        <ul id="historyTasks" class="task-list"></ul>
      </section>

      <p id="status" aria-live="polite"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
