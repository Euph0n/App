services:
  - type: web
    name: task-manager-shared
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /var/data
    disk:
      name: task-data
      mountPath: /var/data
      sizeGB: 1
